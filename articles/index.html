---
layout: layout.html
---

<div class="articles-header">
    <h1>Writing</h1>
    <a class="rss-link" href="/articles.xml">RSS</a>
</div>
<div class="writing-list">
    {% for post in collections.post | reverse %}
    <div class="writing-item">
        <span class="writing-item__date">{{ post.date | postDate }}</span>
        <a class="writing-item__title" href="{{ post.url }}">{{ post.data.title }}</a>
    </div>
    {% endfor %}
</div>
